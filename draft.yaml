models:
  Category:
    name: string:255
    slug: string:255 unique
    parent_id: id foreign:categories nullable
    description: text nullable
    image: string:255 nullable
    sort_order: integer default:0
    is_active: boolean default:1
    timestamps: true
    relationships:
      hasMany: Category:children, Product
      belongsTo: Category:parent

  Product:
    category_id: id foreign
    name: string:255
    slug: string:255 unique
    sku: string:100 unique
    description: text nullable
    short_description: text nullable
    type: string:100 nullable
    panel: string:100 nullable
    power_supply: string:100 nullable
    width: decimal:8,2 nullable
    depth: decimal:8,2 nullable
    height: decimal:8,2 nullable
    weight: decimal:8,2 nullable
    number_of_trays: integer nullable
    tray_size: string:50 nullable
    distance_between_trays: integer nullable
    voltage: string:100 nullable
    electric_power: decimal:8,2 nullable
    frequency: string:50 nullable
    consumption_kwh: decimal:8,2 nullable
    co2_emission: decimal:8,2 nullable
    energy_star_certified: boolean default:0
    price: decimal:12,2 nullable
    is_active: boolean default:1
    sort_order: integer default:0
    timestamps: true
    relationships:
      belongsTo: Category
      belongsToMany: Accessory
      hasMany: ProductImage

  ProductImage:
    product_id: id foreign
    image_path: string:255
    alt_text: string:255 nullable
    sort_order: integer default:0
    is_primary: boolean default:0
    timestamps: true
    relationships:
      belongsTo: Product

  Accessory:
    name: string:255
    slug: string:255 unique
    sku: string:100 unique
    description: text nullable
    short_description: text nullable
    accessory_type: string:100 nullable
    width: decimal:8,2 nullable
    depth: decimal:8,2 nullable
    height: decimal:8,2 nullable
    weight: decimal:8,2 nullable
    voltage: string:100 nullable
    electric_power: decimal:8,2 nullable
    min_flow: decimal:4,2 nullable
    max_flow: decimal:4,2 nullable
    quantity: integer default:1
    price: decimal:12,2 nullable
    is_active: boolean default:1
    sort_order: integer default:0
    timestamps: true
    relationships:
      belongsToMany: Product
      hasMany: AccessoryImage

  AccessoryImage:
    accessory_id: id foreign
    image_path: string:255
    alt_text: string:255 nullable
    sort_order: integer default:0
    is_primary: boolean default:0
    timestamps: true
    relationships:
      belongsTo: Accessory

  ProductAccessory:
    product_id: id foreign
    accessory_id: id foreign
    quantity: integer default:1
    is_default: boolean default:0
    sort_order: integer default:0

controllers:
  Category:
    resource: api
  Product:
    resource: api
  Accessory:
    resource: api

seeders: Category, Product, Accessory
